name: Draw ZMK keymaps
on: [ push, workflow_dispatch ]

jobs:
  draw:
    uses: caksoylar/keymap-drawer/.github/workflows/draw-zmk.yml@main
    permissions:
      contents: write
    with:
      keymap_patterns: "config/crosses.keymap" # path to the keymaps to parse
      config_path: "keymap_drawer.config.yaml" # config file, ignored if not exists
      output_folder: "keymap-drawer" # path to save produced SVGs
      parse_args: "" # map of extra args to pass to `keymap parse`, e.g. "corne:'-l Def Lwr Rse' cradio:''"
      draw_args: "-j info.json" # map of extra args to pass to `keymap draw`, e.g. "corne:'-k corne_rotated' cradio:'-k paroxysm'"   -o '{split: true, rows: 3, columns: 6, thumbs: 3}'
      #install_branch: main # need this until the next release to get the latest keymap-drawer
      #west_config_path: 'config'
